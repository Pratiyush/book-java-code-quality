# Externalized configuration for the Chapter 10 immutability module.
#
# The module ships no hard-coded behavioural constants in the value types; what varies between a fast
# inner-loop build and a gated CI build is the static-analysis policy, which is externalized rather
# than baked in. The profile keys below mirror the two build modes:
#
#   %dev  — fast feedback: compile + tests only (the default `mvn verify`).
#   %prod — the gated build: the `quality` profile adds Checkstyle + SpotBugs (`mvn -Pquality verify`),
#           which is what catches the deliberate counter-examples' contract violations.
#
# Treating the analysis gate as configuration (a profile you turn on for CI) rather than as ambient
# behaviour is the chapter's point made operational: "code quality" is a property a build asserts.

immutability.analysis.profile.dev=compile+test
immutability.analysis.profile.prod=compile+test+checkstyle+spotbugs

# The default currency used by the runnable demo paths; minor units are always integral (cents).
immutability.demo.currency=USD
