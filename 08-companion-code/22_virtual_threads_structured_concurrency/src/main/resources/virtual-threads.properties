# Externalized configuration for the Chapter 22 virtual-threads module.
#
# Nothing the fan-out needs to vary between environments is hard-coded; the target set, the back-pressure
# cap, and the per-call timeout are configuration facts a deployment changes without touching code. The
# profile keys mirror the two build/run modes:
#
#   %dev  — fast feedback: a small target set, a low concurrency cap, a short timeout (the default run).
#   %prod — production sizing: the full target set, a higher back-pressure cap, a longer timeout.
#
# Back-pressure is configuration, not an afterthought (Chapter 22, "Limitations"): virtual threads make
# fan-out cheap, but a downstream connection pool is still finite, so maxConcurrent caps in-flight work
# rather than launching an unbounded number of forks. The cap is read here, never baked into a method.

# %dev profile — fast inner-loop sizing.
vthreads.dev.targets=alpha,bravo,charlie
vthreads.dev.max-concurrent=4
vthreads.dev.per-call-timeout-millis=200

# %prod profile — production sizing.
vthreads.prod.targets=alpha,bravo,charlie,delta,echo,foxtrot,golf,hotel
vthreads.prod.max-concurrent=64
vthreads.prod.per-call-timeout-millis=2000

# Which profile a runnable demo selects by default. A deployment overrides this, not the code.
vthreads.active-profile=dev
