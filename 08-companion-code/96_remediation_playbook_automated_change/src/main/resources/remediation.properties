# Chapter 40 companion — externalized remediation-program configuration.
#
# The thresholds that tune the playbook are config, not hard-coded constants: a deployment changes the pace
# it commits to without recompiling. Two profiles are provided — `dev` for a single team piloting the
# playbook, and `prod` for an estate-wide program with a faster committed pace and a tighter silenced-debt
# budget. The active profile is selected by the `remediation.profile` key (default `dev`); a key with a
# profile prefix (e.g. `prod.paydown.budget`) overrides the unprefixed default when that profile is active.
#
# These keys are this module's own configuration names — they are not tool flags or recipe IDs, so they
# carry no external pin.

remediation.profile=dev

# tag::config-profiles[]
# default (dev): one team piloting the playbook
paydown.budget=3
silenced.budget=25
paydown.min-pace=2

# prod: estate-wide program — more capacity, tighter silenced-debt budget, faster committed pace
prod.paydown.budget=8
prod.silenced.budget=10
prod.paydown.min-pace=5
# end::config-profiles[]
