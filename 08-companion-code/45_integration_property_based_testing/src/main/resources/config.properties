# Chapter 45 companion — externalized configuration (EXAMPLES-GUIDE req. 2).
#
# Behaviour a deployment would change lives here, not hard-coded in Java: the catalog server's bind
# port, the client's request timeout, and the property test's generated-case count. Two profiles are
# provided, dev and prod, in the %profile.key style the book uses across modules. The defaults (no
# prefix) are the safe baseline; a profile overrides only what differs.

# --- defaults (apply unless a selected profile overrides) ---
catalog.server.port=0
catalog.client.timeout-seconds=2
property.generated-cases=200

# --- %dev: an ephemeral port and a short timeout for fast local runs, more generated cases ---
%dev.catalog.server.port=0
%dev.catalog.client.timeout-seconds=2
%dev.property.generated-cases=200

# --- %prod: a fixed published port, a more forgiving timeout, fewer generated cases per run ---
%prod.catalog.server.port=8080
%prod.catalog.client.timeout-seconds=5
%prod.property.generated-cases=50
