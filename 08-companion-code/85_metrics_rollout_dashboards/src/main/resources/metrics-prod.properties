# Metrics rollout profile: prod.
# Externalized config, selected at startup by -Dmetrics.profile=prod (MetricsConfig).
# Prod is the block phase: once the gate has earned trust, a ratchet regression blocks the build, so
# the codebase can only converge upward (Chapter 38 — only-improve thresholds, no big-bang).
ratchet.enforced=true
# The change-failure-rate alert level the dashboard's stability tile flags at. Tighter in prod.
# NOTE: this is this deployment's chosen alert level, not a DORA "elite/high" band (verified at the pin).
change.failure.rate.alert.threshold=0.15
