# Metrics rollout profile: dev.
# Externalized config, selected at startup by -Dmetrics.profile=dev (MetricsConfig).
# Dev is the warn-then-block introduction phase: the ratchet only WARNS so a new gate does not block
# work the day it lands, while the team learns it (Chapter 38 — adoption is a people problem).
ratchet.enforced=false
# The change-failure-rate alert level the dashboard's stability tile flags at. Looser in dev, where
# failing experiments are expected. NOTE: this is a chosen alert level, not a DORA performance band.
change.failure.rate.alert.threshold=0.30
