# Chapter 41 companion — externalized configuration (EXAMPLES-GUIDE req. 2).
#
# Behaviour a deployment would change lives here, not hard-coded in Java: how long a reservation hold
# is honoured before it expires, and the budget a deterministic poll is allowed before it gives up.
# Two profiles are provided, dev and prod, in the %profile.key style the book uses across modules. The
# defaults (no prefix) are the safe baseline; a profile overrides only what differs.

# --- defaults (apply unless a selected profile overrides) ---
reservation.hold-window-seconds=120
async.poll-timeout-seconds=2

# --- %dev: a short hold and a generous poll budget for fast local runs ---
%dev.reservation.hold-window-seconds=30
%dev.async.poll-timeout-seconds=5

# --- %prod: a longer published hold and a tighter poll budget ---
%prod.reservation.hold-window-seconds=900
%prod.async.poll-timeout-seconds=2
