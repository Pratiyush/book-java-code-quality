# Externalized pricing config (Chapter 11 companion).
#
# The default promo code is genuinely optional: in %dev a seed code is configured, and in %prod the
# key is left empty so no default applies. An empty value resolves to an empty Optional, NOT a null —
# the config layer is one more place absence is modelled in the type rather than as a null string.
# The active profile is chosen by the `storefront.profile` system property (default: prod).

# --- %dev: a seeded default promo code for local runs ---
dev.storefront.promo.default-code=WELCOME10

# --- %prod: no default promo code (key intentionally left empty -> empty Optional) ---
prod.storefront.promo.default-code=
