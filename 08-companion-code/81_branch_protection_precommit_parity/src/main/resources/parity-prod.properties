# Local/CI parity policy profile: prod.
# Externalized config, selected at startup by -Dparity.profile=prod (ParityPolicy). This is the policy
# the trunk's CI runs.
# On prod, parity drift FAILS: a required CI check the developer's machine cannot reproduce is exactly
# the "works locally, fails in CI" gap the chapter sets out to remove, so the trunk's build refuses to
# let the gate sets diverge silently. (The required CI check is the enforcement — Chapter 35.)
parity.fail-on-drift=true
# How the local checks are run — the build WRAPPER (Chapter 27), the same command CI runs, so parity is
# a comparison of like with like rather than two different commands.
parity.local-runner=./mvnw -B verify
