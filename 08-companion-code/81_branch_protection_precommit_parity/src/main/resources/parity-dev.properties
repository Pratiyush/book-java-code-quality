# Local/CI parity policy profile: dev.
# Externalized config, selected at startup by -Dparity.profile=dev (ParityPolicy). This is the policy a
# developer's machine runs.
# On dev, parity drift WARNS rather than failing: a developer adding a check is mid-change and may not
# have wired the local counterpart yet, so the drift is surfaced for them to act on, not a hard stop.
# (Hooks are feedback at the keyboard — Chapter 35; the trunk's CI is the enforcement.)
parity.fail-on-drift=false
# How the local checks are run — the build WRAPPER (Chapter 27), the same command CI runs, so a drift
# report can point at where to add the missing check.
parity.local-runner=./mvnw -B verify
