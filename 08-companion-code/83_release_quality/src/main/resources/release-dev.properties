# Release-readiness policy profile: dev.
# Externalized config, selected at startup by -Drelease.profile=dev (ReleasePolicy). This is the policy
# for a pre-release to an internal / staging environment — progressive ceremony: fewer required checks
# than a production release, because a staging build is not yet what reaches users.
# Each check is opt-in: release.require.<CHECK>=true. The checks are the chapter's release gates.
# A dev pre-release still must be a real release version with a changelog entry, but it does not yet
# require signing+SBOM (Part VII) or a smoke test against the staged build.
release.require.RELEASE_VERSION=true
release.require.CHANGELOG_ENTRY=true
release.require.CI_GREEN=false
release.require.SIGNED_WITH_SBOM=false
release.require.SMOKE_TESTED=false
