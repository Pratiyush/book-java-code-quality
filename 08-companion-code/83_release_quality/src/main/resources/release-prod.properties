# Release-readiness policy profile: prod.
# Externalized config, selected at startup by -Drelease.profile=prod (ReleasePolicy). This is the policy
# for a production release — every release gate the chapter names is required before a tag is cut.
# Each check is opt-in: release.require.<CHECK>=true. A team raises or lowers the bar by editing this
# file, never by editing code — the same idea a framework's %dev / %prod config blocks provide.
# tag::release-policy[]
release.require.RELEASE_VERSION=true
release.require.CHANGELOG_ENTRY=true
release.require.CI_GREEN=true
release.require.SIGNED_WITH_SBOM=true
release.require.SMOKE_TESTED=true
# end::release-policy[]
