# Externalized configuration for the Chapter 19 code-smells module.
#
# The module ships no hard-coded behavioural constants in the value types or services; what varies
# between a fast inner-loop build and a gated CI build is the static-analysis policy, which is
# externalized rather than baked in. The profile keys below mirror the two build modes:
#
#   %dev  — fast feedback: compile + tests only (the default `mvn verify`).
#   %prod — the gated build: the `quality` profile adds Checkstyle + SpotBugs (`mvn -Pquality verify`),
#           which is what reports the leaky order's representation-exposure finding (EI_EXPOSE_REP).
#
# Treating the analysis gate as configuration (a profile you turn on for CI) rather than as ambient
# behaviour is the chapter's point made operational: a smell is detected by a rule the build runs, and
# which rules run is itself a decision, not a fixed truth.

smells.analysis.profile.dev=compile+test
smells.analysis.profile.prod=compile+test+checkstyle+spotbugs

# The default currency used by the runnable demo paths; minor units are always integral (cents).
smells.demo.currency=USD

# The free-shipping threshold (minor units) the order service applies; externalized so the policy is a
# configuration fact, not a magic number buried in a long method.
smells.pricing.free-shipping-threshold=5000
