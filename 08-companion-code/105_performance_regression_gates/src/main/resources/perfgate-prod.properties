# Perf-regression-gate profile: prod.
# Externalized config, selected at startup by -Dperfgate.profile=prod (GateConfig).
# The release pipeline protects what users feel, so the bands are tighter than dev — but never so
# tight that runner jitter trips them, which is why the gate also checks the measurement's noise band.
# These numbers are ILLUSTRATIVE: real tolerances come from real requirements (Chapter 43), not round
# numbers (Chapter 1). Set them per service against the p99/throughput your users actually need.
# Below this fractional regression vs baseline the gate passes silently.
gate.flag.tolerance=0.03
# At or above this fractional regression the gate fails the build (and only when also outside the
# measurement's own noise band). Between the two, the gate FLAGS for investigation, not blocks.
gate.fail.tolerance=0.10
