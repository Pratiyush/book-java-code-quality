# Perf-regression-gate profile: dev.
# Externalized config, selected at startup by -Dperfgate.profile=dev (GateConfig).
# Dev favours slack: a developer iterating locally or on a feature branch should not be stopped by a
# small, possibly-noisy slowdown, so the bands are wide and forgiving.
# Below this fractional regression vs baseline the gate passes silently.
gate.flag.tolerance=0.10
# At or above this fractional regression the gate fails the build (and only when also outside the
# measurement's own noise band). Between the two, the gate FLAGS for investigation, not blocks.
gate.fail.tolerance=0.25
