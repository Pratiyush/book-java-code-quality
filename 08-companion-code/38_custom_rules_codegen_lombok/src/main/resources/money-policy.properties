# Externalized policy for the money-representation rules (EXAMPLES-GUIDE req. 2: profiles, not
# hard-coded values). The rules read their severity and field-name pattern from here, so a team can
# tune the house rule without editing the rule code — the same separation the analyzers themselves use
# between a rule's logic and its configuration. Two profiles are provided; MoneyPolicy.forProfile picks
# one by name (defaulting to prod).
#
# - dev:  the rule reports as a WARNING so a team can adopt it and gather signal first (the dossier's
#         "ship WARNING, then promote to ERROR" on-ramp).
# - prod: the rule reports as an ERROR so a violation fails the build.
#
# The field-name pattern marks which member names are treated as money for the name-based source-style
# rule; the structural rules (record component type, ArchUnit) do not need it because they match on the
# floating-point type directly.

dev.severity=WARNING
dev.moneyNamePattern=(?i).*(price|amount|cost|fee|balance|total|money).*

prod.severity=ERROR
prod.moneyNamePattern=(?i).*(price|amount|cost|fee|balance|total|money).*
