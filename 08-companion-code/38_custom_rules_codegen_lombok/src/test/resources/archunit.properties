# ArchUnit configuration for the freezing ratchet (SOURCE-PIN: ArchUnit 1.4.2). The freeze store is a
# build artifact, so it lives under target/ and is allowed to be created and updated on the first run
# that records the legacy baseline. This is the legacy-adoption on-ramp the chapter describes: turn a
# custom rule on over a codebase with existing breaches without an impossible day-one cleanup.
freeze.store.default.path=target/archunit-freeze
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true
