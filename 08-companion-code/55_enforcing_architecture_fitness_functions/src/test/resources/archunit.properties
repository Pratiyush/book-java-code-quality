# ArchUnit configuration for the freezing ratchet and cycle detection (SOURCE-PIN: ArchUnit 1.4.2).
# The freeze store is a build artifact, so it lives under target/ and is allowed to be created and
# updated on the first run that records the legacy baseline.
freeze.store.default.path=target/archunit-freeze
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true

# Cycle-detection limits at their documented defaults; raised limits cost import time on large graphs.
cycles.maxNumberToDetect=100
cycles.maxNumberOfDependenciesPerEdge=20
