# AI-in-the-workflow policy profile: prod.
# Externalized config, selected at startup by -Daigov.profile=prod (AiGovernancePolicy). This is the
# policy the gate guarding the trunk / a release runs — stricter than dev, the way a framework's %prod
# block is.
#
# The tool names below are GENERIC PLACEHOLDERS for "the assistants this organization has vetted", not an
# endorsement of any product — tool selection is each organization's own security/compliance decision,
# and the book crowns no tool. Replace them with the assistants your organization has actually sanctioned.
aigov.sanctioned-tools=vetted-assistant-a, vetted-assistant-b
# The trunk policy requires the full AI-specific set: the security stack (SAST/SCA/secrets) AND
# mutation-verification of any AI-generated tests (Chapter 23), because coverage alone can be plausible
# but empty. Values: SAST|SCA|SECRETS|MUTATION_VERIFIED_TESTS.
aigov.required-checks=SAST, SCA, SECRETS, MUTATION_VERIFIED_TESTS
# Disclosure of AI use (provenance) — required; some contexts now mandate it.
aigov.require-disclosure=true
# A human must own the merge ("the AI did it" is not a defense).
aigov.require-accountable-human=true
# The hard line: no auto-merge on an AI reviewer's approval alone. On in every profile.
aigov.forbid-auto-merge-on-ai-review=true
