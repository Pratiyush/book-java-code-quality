# AI-in-the-workflow policy profile: dev.
# Externalized config, selected at startup by -Daigov.profile=dev (AiGovernancePolicy). This is the
# policy a feature-branch / pull-request build runs — a little more permissive than the trunk policy,
# the way a framework's %dev block is.
#
# The tool names below are GENERIC PLACEHOLDERS for "the assistants this organization has vetted", not an
# endorsement of any product — tool selection is each organization's own security/compliance decision
# (where does the code go? IP of suggestions? privacy posture?), and the book crowns no tool. Replace
# them with the assistants your organization has actually sanctioned.
aigov.sanctioned-tools=vetted-assistant-a, vetted-assistant-b
# The AI-specific checks an AI-assisted change must have run, on top of the normal gates. dev requires
# the security stack (inherited vulnerabilities, Chapter 41) but not mutation-verified AI tests, which
# are deferred to the stricter trunk policy. Values: SAST|SCA|SECRETS|MUTATION_VERIFIED_TESTS.
aigov.required-checks=SAST, SCA, SECRETS
# Disclosure of AI use (provenance) — on even on a feature branch; it is cheap and it is the discipline
# this book applies to itself.
aigov.require-disclosure=true
# A human must own the merge ("the AI did it" is not a defense).
aigov.require-accountable-human=true
# The hard line: no auto-merge on an AI reviewer's approval alone. On in every profile.
aigov.forbid-auto-merge-on-ai-review=true
