# Coverage-gate policy — dev profile (externalized config, not hard-coded; Chapter 34).
# Looser on local/feature work so the inner loop is not punitive: the ratchet still holds so coverage
# cannot quietly regress, but the new-code bar and the aspirational target are gentler than prod.
coverage.newCodeBar=0.70
coverage.ratchet=true
coverage.overallTarget=0.75
