# Coverage-gate policy — prod profile (externalized config, not hard-coded; Chapter 34).
# The bar that protects the main branch: new code must clear a firm diff-coverage threshold, overall
# coverage may only go up (ratchet), and the aspirational whole-repo target warns (never blocks — a
# whole-repo percentage that blocks gets gamed with assertion-free tests, Goodhart).
coverage.newCodeBar=0.80
coverage.ratchet=true
coverage.overallTarget=0.85
