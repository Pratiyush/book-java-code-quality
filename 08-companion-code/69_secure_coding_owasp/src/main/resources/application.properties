# Externalized security tunables for the storefront order-intake gate (Chapter 30 companion).
#
# Security-relevant parameters that a deployment changes are configuration, never hard-coded
# literals: the request-body cap and the PBKDF2 work factor. Two profiles are externalized so a
# deployment selects the posture rather than recompiling. Selected with -Dsecurity.profile=prod
# (default: dev).
#
# Crypto guidance is DATED, not timeless: the prod PBKDF2 iteration count is a current baseline to
# date against OWASP/NIST guidance, raised over time as hardware speeds up. dev uses a lower cost so
# the test suite stays fast; prod uses the stronger work factor.

# --- dev profile (fast feedback) ---
%dev.security.request.max-body-chars=4096
%dev.security.password.pbkdf2-iterations=120000

# --- prod profile (stronger work factor) ---
%prod.security.request.max-body-chars=4096
%prod.security.password.pbkdf2-iterations=210000
