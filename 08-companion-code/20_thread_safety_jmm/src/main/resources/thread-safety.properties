# Externalized configuration for the Chapter 13 thread-safety module.
#
# Nothing that a deployment would tune is hard-coded in the services. What varies between a fast
# inner-loop run and a production run is the worker-pool size and how long a graceful shutdown waits
# for in-flight work to drain — both externalized here under two profiles:
#
#   %dev  — fast feedback: a small pool and a short shutdown grace period.
#   %prod — production: a wider pool and a longer drain window before the forced shutdownNow() fallback.
#
# WorkCoordinatorConfig selects a profile at construction (default: dev) and reads the matching keys,
# so the pool size and shutdown timeout are configuration facts, not magic numbers buried in code.

# Worker-pool size per profile (number of concurrent worker threads).
coordinator.dev.max-concurrency=2
coordinator.prod.max-concurrency=8

# Graceful-shutdown grace period per profile, in milliseconds, before shutdownNow() is invoked.
coordinator.dev.shutdown-grace-millis=200
coordinator.prod.shutdown-grace-millis=5000
