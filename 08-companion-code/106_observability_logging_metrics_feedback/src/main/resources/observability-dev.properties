# Observability profile: dev.
# Externalized config, selected at startup by -Dobservability.profile=dev (ObservabilityConfig).
# Dev favours visibility: DEBUG is on so diagnostics are written while developing.
log.level=DEBUG
# The SLO error-budget threshold (fraction of failing requests) the health gauge reports against.
# Looser in dev, where failing experiments are expected and should not flip health to DOWN.
slo.error.budget=0.20
