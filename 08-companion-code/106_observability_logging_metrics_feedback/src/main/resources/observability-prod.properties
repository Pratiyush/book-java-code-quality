# Observability profile: prod.
# Externalized config, selected at startup by -Dobservability.profile=prod (ObservabilityConfig).
# Prod favours signal over volume: DEBUG is off so hot paths do not flood the log platform or the
# bill (Chapter 43 — logging has real I/O, allocation, and storage cost).
log.level=INFO
# The SLO error-budget threshold the health gauge alerts on: alert on budget BURN, not every blip.
# Tighter in prod, where a sustained 5% error rate is worth waking someone for.
slo.error.budget=0.05
