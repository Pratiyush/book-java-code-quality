# Sonar analysis configuration for the layered stack (Chapter 17 — Composition, Not Accumulation).
#
# This file is CONFIGURATION, NOT run by this module's Maven build. It is what the SonarScanner reads when
# the platform layer runs (the SonarScanner CLI, `sonar-scanner`, or the keys the Maven/Gradle scanner sets
# automatically). It shows the wiring the chapter teaches: where Sonar's rule engine (sonar-java) finds its
# inputs, and how the quality gate is scoped to NEW code (Clean as You Code) and made to FAIL the build.
#
# Sonar is a hosted / continuously-released platform. SOURCE-PIN.md §2 pins the Sonar row at SonarQube
# Server 2026.1 LTA (patch 2026.1.3); the scanner GAV version, the named rules' default severities, and
# edition gating are version-sensitive and recorded `⚠ verify at pin` (09-flags/35_*). So every Sonar
# version here is DATED AT USE (2026-06), never timeless, and no rule severity or edition feature is
# asserted from memory. The host URL and the analysis token are supplied at run time (env / CI secret),
# never committed.

# tag::sonar-keys[]
sonar.projectKey=org.acme.storefront:sonarqube-ide-layered-stack
sonar.java.source=21                  # analyze at the SOURCE-PIN anchor LTS (Java 21)
sonar.java.binaries=target/classes    # REQUIRED for multi-file Java: compiled .class dirs, or analysis fails
sonar.java.libraries=target/dependency/*.jar   # the classpath sonar-java resolves symbols against
sonar.sources=src/main/java
sonar.tests=src/test/java
# end::sonar-keys[]

# The platform's load-bearing policy: Clean as You Code. Scope the quality gate to NEW (added/changed) code
# rather than the whole codebase, so a legacy codebase is not blocked wholesale — the gate is adoptable
# because keeping new code clean is enough. `sonar.qualitygate.wait=true` makes the scanner BLOCK (fail the
# build) when the gate fails on new code, the chapter's explicit failure path at the platform layer. The
# new-code definition (here: changes relative to the previous version) is the scope the gate evaluates.

# tag::quality-gate-wait[]
sonar.qualitygate.wait=true                       # fail the build when the quality gate fails
sonar.newCode.referenceBranch=main                # Clean as You Code: gate only NEW code vs this reference
# end::quality-gate-wait[]
