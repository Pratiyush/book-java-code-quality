# Security-gate policy profile: dev.
# Externalized config, selected at startup by -Dsecgate.profile=dev (SecurityGatePolicy). This is the
# policy a feature-branch / pull-request build runs.
# Clean-as-you-code: gate only new and changed code, never whole-repo absolutes — the scoping that keeps
# the security gate from blocking every pull request on inherited findings, the number-one way a gate is
# routed around or disabled (Chapter 19).
gate.clean-as-you-code=true
# Block only on objective, high-severity NEW findings; everything below this severity is routed to a
# reviewer, not blocked, so the gate's red light always means something real. Values: INFO|LOW|MEDIUM|HIGH.
gate.block.severity=HIGH
# Require a finding to be confirmed exploitable before it blocks the build. A severe but unreachable sink,
# or a non-security use of a weak primitive, is routed to a security reviewer instead — exploitability is
# a judgment a severity number does not capture (Chapter 84).
gate.require-exploitable-to-block=true
