# Security-gate policy profile: prod.
# Externalized config, selected at startup by -Dsecgate.profile=prod (SecurityGatePolicy). This is the
# policy the gate guarding the trunk / a release runs.
# Clean-as-you-code stays on even for the trunk: gating whole-repo absolutes would block every merge on
# inherited security debt the change did not create — the number-one way a gate gets routed around
# (Chapter 19). The pre-existing backlog is triaged, not used to block the change.
gate.clean-as-you-code=true
# Block on high-severity new findings. A team raises or lowers this per their false-positive rate: set it
# too low and the noise gets the gate disabled; too high and real vulnerabilities slip through. INFO|LOW|MEDIUM|HIGH.
gate.block.severity=HIGH
# The release gate is the conservative one: it blocks a new high-severity finding without waiting for an
# exploitability verdict (fail-closed at the trunk), rather than routing it to review the way a
# feature-branch gate does. A team tunes this knob to its tolerance — the threshold is policy, not code.
gate.require-exploitable-to-block=false
