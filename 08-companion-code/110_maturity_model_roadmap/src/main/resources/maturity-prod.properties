# Maturity roadmap policy: prod.
# Externalized config, selected at startup by -Dmaturity.profile=prod (RoadmapPolicy). This is the policy a
# mature program runs once it measures outcomes, and it is deliberately stricter than dev.
# Require-outcomes: ON. A dimension's advanced stage counts only when its outcomes are actually improving;
# a high stage with stalled outcomes is discounted to FOUNDATIONS, because "we're Level 4" with no outcome
# behind it is a vanity badge, exactly the Goodhart trap the chapter warns against (Chapters 1, 38).
# The recommendation for such a dimension is to make the practice pay, never to climb further. Values: true|false.
roadmap.require-outcomes=true
# Sustain-at-stage: GOVERN_OBSERVE. Once every dimension reaches govern-and-observe with outcomes improving,
# the model recommends sustaining and subtracting gates that no longer pay rather than adding more, because
# more maturity is not more value past a point — over-governance ossifies (Chapters 26, 33). A team raises
# or lowers this for its own context. Values: FOUNDATIONS|GATE_BASICS|DEEPEN|GOVERN_OBSERVE|SUSTAIN_EVOLVE.
roadmap.sustain-at-stage=GOVERN_OBSERVE
