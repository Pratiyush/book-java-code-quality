# Maturity roadmap policy: dev.
# Externalized config, selected at startup by -Dmaturity.profile=dev (RoadmapPolicy). This is the lenient
# policy a team uses early, while it is still wiring up outcome measurement and just wants to see where its
# lowest dimension is.
# Require-outcomes: OFF here. A dimension's claimed stage counts as recorded even before the team can show
# its outcomes are improving, because demanding outcome evidence on day one would stall a team that has not
# yet stood up its delivery/stability metrics (Chapter 38). The prod policy turns this on. Values: true|false.
roadmap.require-outcomes=false
# Sustain-at-stage: only at the very top. Early on, there is almost always a next valuable thing to adopt,
# so the model keeps recommending the lowest, most painful dimension rather than telling a young program to
# stop. Values: FOUNDATIONS|GATE_BASICS|DEEPEN|GOVERN_OBSERVE|SUSTAIN_EVOLVE.
roadmap.sustain-at-stage=SUSTAIN_EVOLVE
