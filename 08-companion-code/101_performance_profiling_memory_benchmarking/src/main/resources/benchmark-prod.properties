# Benchmark execution profile — PROD (the thorough run an honest result is reported from).
# More warmup, more measurement iterations, and multiple forks expose run-to-run variance. A result
# from this profile still carries its JDK and hardware; it is evidence about one method, not the
# system (micro is not macro).
benchmark.warmupIterations=5
benchmark.measurementIterations=5
benchmark.forks=2
