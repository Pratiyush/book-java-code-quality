# Externalized configuration for the Chapter 14 generics & type-safety module.
#
# The type-safety this module demonstrates is a build-time property, so what varies between a fast
# inner-loop build and a gated CI build is the analysis policy, which is externalized rather than baked
# in. The profile keys below mirror the two build modes:
#
#   %dev  — fast feedback: compile + tests only (the default `mvn verify`). The compiler still runs
#           -Xlint:all (set once in the aggregator), so unchecked/rawtypes and varargs heap-pollution
#           warnings already surface here — the chapter's "health surface" for type-safety.
#   %prod — the gated build: the `quality` profile adds Checkstyle + SpotBugs (`mvn -Pquality verify`),
#           the source-level rules layered on top of the compiler's own checks.
#
# Treating the analysis gate as configuration (a profile you turn on for CI) rather than as ambient
# behaviour is the chapter's point made operational: type-safety is a property a build asserts.

generics.analysis.profile.dev=compile+test
generics.analysis.profile.prod=compile+test+checkstyle+spotbugs

# The default initial capacity the runnable demo paths build a Stack with; it grows as needed.
generics.stack.initial-capacity=16
