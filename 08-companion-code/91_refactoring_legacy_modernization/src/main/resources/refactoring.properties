# Externalized configuration for the Chapter 39 refactoring / legacy / strangler module.
#
# The strangler cutover is a configuration decision, not a hard-coded constant: which slice routes to
# the modern path is exactly the kind of value a deployment flips and rolls back, so it is externalized
# here rather than baked into the router. The profile keys below mirror the two build modes and the two
# cutover positions:
#
#   %dev  — fast feedback: compile + tests only (the default `mvn verify`); cutover defaults to the
#           legacy path so the strangler stays in its safe, rollback position until a slice is proven.
#   %prod — the gated build: the `quality` profile adds Checkstyle + SpotBugs (`mvn -Pquality verify`),
#           and the cutover routes the migrated slice to the modern path.
#
# Treating the cutover flag as configuration (a flag CI and ops own) rather than as a compiled constant
# is the chapter's strangler discipline made operational: route incrementally, and keep the rollback
# lever outside the code.

refactoring.cutover.dev=legacy
refactoring.cutover.prod=modern

# The default currency used by the runnable demo paths; minor units are always integral (cents).
refactoring.demo.currency=USD

# The base rate per kilo (minor units) for the demo's primary zone; externalized so the rate is a
# configuration fact, not a magic number buried in a legacy method body.
refactoring.demo.zone-a-rate-per-kilo=500
