# Externalized tunables for the AI-review gate (Chapter 41 companion).
#
# The posture a deployment changes is configuration, never a hard-coded literal: the request-body cap
# the gate enforces before it parses untrusted input, and whether the gate rejects an AI contribution
# whose source is not attested. Two profiles are externalized so a deployment selects the posture
# rather than recompiling. Selected with -Dai.profile=prod (default: dev).
#
# The stance is dated, not timeless: prod requires provenance because the chapter treats an AI
# contribution as untrusted until verified, while dev keeps the lower-friction posture so the local
# loop and the test suite stay fast. The values here are this team's cited choices, not universal
# constants.

# --- dev profile (fast local feedback) ---
%dev.ai.request.max-body-chars=4096
%dev.ai.require-provenance=false

# --- prod profile (stricter: provenance required) ---
%prod.ai.request.max-body-chars=4096
%prod.ai.require-provenance=true
