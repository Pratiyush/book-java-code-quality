# Illustrative CI pipeline for the book's quality stack (Chapter 33 — A Gate the Team Keeps On).
#
# This file is CONFIGURATION, not run by this module's Maven build. It shows the pipeline shape the
# chapter teaches: fail-fast stages ordered cheap-to-expensive, a pull-request-fast versus main-full
# split that keeps the blocking path short, dependency caching and parallel execution for speed, and a
# clean-as-you-code quality gate as the required status check. Each stage runs the SAME build a developer
# runs locally (Chapter 27, local/CI parity) — the local equivalent is `mvn -Pquality verify` against
# this module, which the gate-policy code (org.acme.cigate.QualityGate) mirrors and unit-tests.
#
# Action and tool versions are pinned where SOURCE-PIN.md pins them (Java 21 anchor; the analyzers and
# coverage tool are pinned in the module's pom). The GitHub Actions used here (actions/checkout,
# actions/setup-java, actions/cache) are hosted/SaaS — SOURCE-PIN.md §5 records them as "docs as of
# 2026-06 (rolling)", so they are DATED AT USE (2026-06), not timeless; pin each to a release tag and a
# digest when this is adopted (see the chapter's gate report and 09-flags/).
name: quality-gates

# tag::pr-vs-main-split[]
on:
  pull_request:                 # PR: the cheap, blocking gates only — fast feedback
    branches: [main]
  push:
    branches: [main]            # main: adds the heavy stage off the critical path
  schedule:
    - cron: "0 3 * * *"         # nightly: the most expensive checks (mutation, full scan)
# end::pr-vs-main-split[]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------------------------------
  # Stage 1 (PR): compile + format-check + fast linters. Seconds; catches the cheapest, most-likely
  # failures first, so a broken change fails fast before any expensive stage runs.
  # ---------------------------------------------------------------------------------------------------
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # SaaS action, dated-at-use 2026-06 (pin to a digest at adoption)
      - uses: actions/setup-java@v4        # SaaS action, dated-at-use 2026-06
        with:
          distribution: temurin
          java-version: "21"               # SOURCE-PIN.md anchor LTS (Java 21)
      # tag::cache[]
      - uses: actions/cache@v4             # ~/.m2 dependency cache — unchanged deps are not re-downloaded
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/pom.xml') }}   # a precise key; a bad key can false-green (clean build on main)
      - name: Compile + fast lint (parallel reactor)
        run: mvn -B -T 1C -Pquality -DskipTests verify   # -T = parallel modules, a speed lever
      # end::cache[]

  # ---------------------------------------------------------------------------------------------------
  # Stage 2 (PR): unit tests + coverage threshold. Fast feedback on behaviour; the coverage gate is
  # scoped to NEW code (clean-as-you-code), not a whole-repo percentage that would block every PR.
  # ---------------------------------------------------------------------------------------------------
  test-and-coverage:
    needs: build-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # tag::test-coverage-gate[]
      - name: Unit tests + new-code coverage (JaCoCo)
        run: mvn -B -Pquality test   # unit tests; the JaCoCo 0.8.15 new-code coverage gate binds in verify — see Ch 23
      # end::test-coverage-gate[]

  # ---------------------------------------------------------------------------------------------------
  # Stage 3 (PR): heavier static analysis + a dependency/security scan. Slower than the lint stage but
  # still on the PR; this is the stage the local `mvn -Pquality verify` mirrors (Checkstyle + SpotBugs).
  # ---------------------------------------------------------------------------------------------------
  static-and-security:
    needs: test-and-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # tag::static-security-gate[]
      - name: Static analysis (Checkstyle + SpotBugs)
        run: mvn -B -Pquality verify          # the local equivalent of this gate (Chapter 27 parity)
      - name: Dependency vulnerability scan
        run: mvn -B org.owasp:dependency-check-maven:check   # OWASP Dependency-Check 12.2.2 (SOURCE-PIN §4)
      # end::static-security-gate[]

  # ---------------------------------------------------------------------------------------------------
  # The blocking gate. This job is the one wired as a REQUIRED status check in branch protection
  # (Chapter 35): it cannot be merged around. It blocks on the chapter's clean-as-you-code policy —
  # new high-severity findings fail the build, pre-existing debt only warns — mirroring QualityGate.
  # ---------------------------------------------------------------------------------------------------
  quality-gate:
    needs: [build-and-lint, test-and-coverage, static-and-security]   # required status check (Chapter 35)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean-as-you-code gate
        run: echo "block on new high-severity findings; warn on pre-existing debt (org.acme.cigate.QualityGate)"

  # ---------------------------------------------------------------------------------------------------
  # main / nightly only: the expensive checks deferred off the PR critical path so they never block a
  # developer waiting to merge. Mutation testing and a deep scan run where their latency is affordable.
  # ---------------------------------------------------------------------------------------------------
  deep-checks-main-nightly:
    if: github.event_name != 'pull_request'   # never on a PR — the PR/main/nightly split is a speed lever
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Mutation testing (PITest) + clean build
        run: mvn -B -Pquality verify org.pitest:pitest-maven:mutationCoverage   # PITest 1.25.3 (SOURCE-PIN §3)
