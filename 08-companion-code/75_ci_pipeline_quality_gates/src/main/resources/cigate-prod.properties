# Quality-gate policy profile: prod.
# Externalized config, selected at startup by -Dcigate.profile=prod (GatePolicy). This is the policy
# the gate guarding the trunk / a release runs.
# Clean-as-you-code stays on even for the trunk: gating whole-repo absolutes would block every merge on
# inherited debt the change did not create — the number-one way a gate gets routed around (Chapter 19).
gate.clean-as-you-code=true
# Block on high-severity new findings. A team raises or lowers this per their false-positive rate: set
# it too low and the noise gets the gate disabled; too high and real defects slip through. INFO|LOW|MEDIUM|HIGH.
gate.block.severity=HIGH
