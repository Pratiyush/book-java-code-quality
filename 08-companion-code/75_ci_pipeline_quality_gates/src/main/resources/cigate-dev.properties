# Quality-gate policy profile: dev.
# Externalized config, selected at startup by -Dcigate.profile=dev (GatePolicy). This is the policy a
# feature-branch / pull-request build runs.
# Clean-as-you-code: gate only new and changed code, never whole-repo absolutes — the scoping that
# makes the gate adoptable on a legacy codebase and assigns ownership to whoever touched the code.
gate.clean-as-you-code=true
# Block only on objective, high-severity NEW findings; everything below this severity is warned, not
# blocked, so the gate's red light always means something real (Chapter 19). Values: INFO|LOW|MEDIUM|HIGH.
gate.block.severity=HIGH
