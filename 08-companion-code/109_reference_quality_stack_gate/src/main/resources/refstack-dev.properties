# Reference gate-ladder profile: dev.
# Externalized config, selected at startup by -Drefstack.profile=dev (GateLadder). This is the ladder a
# feature-branch / pull-request build runs while a team is still adopting the stack.
# Enforce-from: only PR_FAST and later stages can block here. Pre-commit findings are advisory on a
# feature branch, so an in-progress change is not blocked by the earliest stage before it is ready. A
# team adopting the stack incrementally moves this later early on and ratchets it earlier over time
# (Chapters 38, 40). Values: PRE_COMMIT|PR_FAST|MAIN_NIGHTLY|MERGE.
ladder.enforce-from=PR_FAST
# Clean-as-you-code: block only on new and changed code, never whole-repo absolutes — the scoping that
# makes the stack adoptable on a legacy codebase and assigns ownership to whoever touched the code.
ladder.clean-as-you-code=true
# Block only on objective, high-severity findings; everything below is advisory, so the gate's no-ship
# verdict always means something real (Chapter 19). Values: INFO|LOW|MEDIUM|HIGH.
ladder.block.severity=HIGH
