# Reference gate-ladder profile: prod.
# Externalized config, selected at startup by -Drefstack.profile=prod (GateLadder). This is the ladder
# the gate guarding the trunk / a release runs once the stack is fully adopted.
# Enforce-from: PRE_COMMIT and later — every stage is enforced on the trunk, so nothing the ladder
# defines is advisory at the line that matters. This is the ratcheted end-state a team reaches after
# incremental adoption (Chapters 38, 40). Values: PRE_COMMIT|PR_FAST|MAIN_NIGHTLY|MERGE.
ladder.enforce-from=PRE_COMMIT
# Clean-as-you-code stays on even for the trunk: gating whole-repo absolutes would block every merge on
# inherited debt the change did not create — the number-one way a gate gets routed around (Chapter 19).
ladder.clean-as-you-code=true
# Block on high-severity findings. A team raises or lowers this per their false-positive rate: set it
# too low and the noise gets the gate disabled; too high and real defects slip through. INFO|LOW|MEDIUM|HIGH.
ladder.block.severity=HIGH
