# Externalized configuration for the Chapter 2 readability module.
#
# The module ships no hard-coded behavioural constants in the pricing service; what varies between a
# fast inner-loop build and a gated CI build is the static-analysis policy, which is externalized rather
# than baked in. The profile keys below mirror the two build modes:
#
#   %dev  — fast feedback: compile + tests only (the default `mvn verify`).
#   %prod — the gated build: the `quality` profile adds Checkstyle + SpotBugs (`mvn -Pquality verify`),
#           which is where a complexity rule like Sonar java:S3776 would run in a fuller stack (the
#           house Checkstyle/SpotBugs gate here does not measure complexity — Chapter 16).
#
# Treating the analysis gate as configuration (a profile you turn on for CI) rather than as ambient
# behaviour is the chapter's point made operational: which metrics a build enforces is itself a
# decision, not a fixed truth.

readability.analysis.profile.dev=compile+test
readability.analysis.profile.prod=compile+test+checkstyle+spotbugs

# The default currency used by the runnable demo paths; minor units are always integral (cents).
readability.demo.currency=USD

# The discount cap (minor units) the pricing service applies; externalized so the policy is a
# configuration fact, not a magic number buried in a rule.
readability.pricing.discount-cap=2000

# The no-discount floor (minor units): below this subtotal, no discount applies. Externalized for the
# same reason as the cap.
readability.pricing.floor=1000
