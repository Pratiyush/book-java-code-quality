# Externalized configuration for the design-direction surface (EXAMPLES-GUIDE req. 2).
#
# The active profile is selected by the `design.profile` system property (default: dev). Each profile
# sets how strictly a wrong-direction dependency is treated, so the policy is a deployment choice and
# not hard-coded: dev reports it (lenient, so a developer sees the warning but is not blocked); prod
# rejects it (strict, so the Stable Dependencies Principle is enforced at the boundary).

# %dev — lenient: a wrong-direction dependency is reported, not rejected.
%dev.direction.enforce=false

# %prod — strict: a wrong-direction dependency is rejected with a typed error.
%prod.direction.enforce=true
