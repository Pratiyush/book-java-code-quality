# Secrets-handling profile: prod.
# Externalized config, selected at startup by -Dsecrets.profile=prod. This is the binding the production
# deployment uses. As in dev, only the NAME of the environment variable is recorded; the credential value
# is injected by the platform's secret store (Vault / a cloud secret manager) at runtime. Keeping the
# value out of every profile file is the design-out-the-class fix from Chapter 30 applied to credentials:
# there is no place in source for a secret to leak from.
secrets.order-store.credential-var=ORDER_STORE_TOKEN_PROD
