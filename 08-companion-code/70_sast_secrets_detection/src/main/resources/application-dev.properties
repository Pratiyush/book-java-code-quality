# Secrets-handling profile: dev.
# Externalized config, selected at startup by -Dsecrets.profile=dev. This is the binding a developer's
# local / feature-branch build uses. The credential itself is NOT here — only the NAME of the environment
# variable that holds it. The value is supplied by the environment or a secret store at runtime, never
# committed to source, which is the prevention secrets detection backstops (a hardcoded value here is the
# leaked-credential class this chapter detects).
secrets.order-store.credential-var=ORDER_STORE_TOKEN_DEV
