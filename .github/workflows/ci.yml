name: book-pipeline-ci

# Runs the book-production validation suite on PRs to main (the spec's pre-push checks, adapted to
# GitHub). Python/bash checks are required; the Maven quality build runs on JDK 21 but is allowed to
# fail until a stable runner is proven (the companion-code suite is still being built out).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Anti-drift status check
        run: python3 .claude/scripts/status.py --check-only
      - name: Snippet markers resolve (04-approved)
        run: bash .claude/scripts/check_snippets.sh 04-approved
      - name: Cross-references (06-assembly, if present)
        run: |
          if [ -d 06-assembly ] && [ -n "$(ls -A 06-assembly 2>/dev/null)" ]; then
            bash .claude/scripts/check_crossrefs.sh 06-assembly
          else
            echo "06-assembly empty — skipping crossref check"
          fi
      - name: Figure review (20 parameters)
        run: python3 .claude/scripts/review_figures.py --check-only
      - name: Whitespace / conflict markers
        run: git diff --check HEAD~1 HEAD || git diff --check

  companion-quality:
    runs-on: ubuntu-latest
    continue-on-error: true        # allowed-failure until the per-chapter module suite is complete
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Companion-code quality build
        run: mvn -B -Pquality -f 08-companion-code/pom.xml verify
      - name: Capstones quality build
        run: mvn -B -Pquality -f 08-companion-code/capstones/pom.xml verify
